<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cable Sansar Partner App</title>
  <meta name="description" content="Redeem points and manage bills for Cable Sansar Partner Apps" />
  <meta name="theme-color" content="#7c3aed" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cable Sansar" />
  
  <link rel="apple-touch-icon" href="/icon-192.svg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.svg" />

  <script>
    // Capture beforeinstallprompt early before React mounts (Android)
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.__installPrompt = e;
    });
    window.addEventListener('appinstalled', () => {
      window.__installPrompt = null;
    });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
